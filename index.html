<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kotiasiat</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA: restore path from 404 redirect
      (function() {
        var q = new URLSearchParams(window.location.search)
        var p = q.get('p')
        if (p) {
          q.delete('p')
          var rest = q.toString()
          history.replaceState(null, '', p + (rest ? '?' + rest : ''))
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
